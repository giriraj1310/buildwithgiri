<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Primary Meta Tags -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Build with Giri – Career, Tech & Personal Growth</title>
    <meta name="title" content="Build with Giri – Career, Tech & Personal Growth" />
    <meta name="description" content="Giriraj's personal site sharing career reflections, tech journey, and lessons from working in the industry." />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" sizes="32x32" type="image/x-icon" />
    <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="icon" href="/favicon-16.png" sizes="16x16" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Fonts: Syne (headings/brand) + Plus Jakarta Sans (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://buildwithgiri.com/" />
    <meta property="og:title" content="Build with Giri – Career, Tech & Personal Growth" />
    <meta property="og:description" content="Giriraj's personal site sharing career reflections, tech journey, and lessons from working in the industry." />
    <meta property="og:image" content="/preview-img.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://buildwithgiri.com/" />
    <meta property="twitter:title" content="Build with Giri – Career, Tech & Personal Growth" />
    <meta property="twitter:description" content="Giriraj's personal site sharing career reflections, tech journey, and lessons from working in the industry." />
    <meta property="twitter:image" content="/preview-img.png" />
    <!-- Dark mode: apply class before React loads to prevent flash -->
    <script>
      try {
        var t = localStorage.getItem('theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      } catch(e) {}
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
